packages:
  - "."

# pnpm 11 hard-fails install when native build scripts are skipped. We
# explicitly approve sharp's prebuilt-binary post-install step. The
# unrs-resolver entry exists because some Next 16 toolchains pull it in.
onlyBuiltDependencies:
  - sharp
  - unrs-resolver
  - "@tailwindcss/oxide"
  - esbuild

dangerouslyAllowAllBuilds: true

# Force >=8.5.10 to close GHSA-qx2v-qp2m-jg93 (postcss XSS via unescaped
# </style> in stringify output). Reached transitively via Next.js.
# Drop this override once Next ships a lockfile that already satisfies it.
overrides:
  postcss: ">=8.5.10"
